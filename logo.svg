<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 72" width="180" height="72">
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff9090"/>
      <stop offset="50%"  stop-color="#e83030"/>
      <stop offset="100%" stop-color="#c01818"/>
    </linearGradient>
  </defs>

  <!-- 3D shadow (bottom-right layers) -->
  <text x="20" y="58" font-family="Arial Black, Impact, sans-serif" font-size="56" font-weight="900" fill="#6b0000">Hazy</text>
  <text x="18" y="56" font-family="Arial Black, Impact, sans-serif" font-size="56" font-weight="900" fill="#8b0a0a">Hazy</text>
  <text x="16" y="54" font-family="Arial Black, Impact, sans-serif" font-size="56" font-weight="900" fill="#aa1010">Hazy</text>
  <text x="14" y="52" font-family="Arial Black, Impact, sans-serif" font-size="56" font-weight="900" fill="#c81818">Hazy</text>

  <!-- Main front text -->
  <text x="12" y="50" font-family="Arial Black, Impact, sans-serif" font-size="56" font-weight="900" fill="url(#shine)">Hazy</text>

  <!-- White highlight stroke on top edge -->
  <text x="12" y="50" font-family="Arial Black, Impact, sans-serif" font-size="56" font-weight="900"
        fill="none" stroke="#ffaaaa" stroke-width="0.5" opacity="0.6">Hazy</text>
</svg>
